<script type="module">

import * as webllm from "https://esm.run/@mlc-ai/web-llm";

let engine;
let ready = false;

async function init() {

  document.getElementById("output").innerText = "Loading model...";

  engine = new webllm.MLCEngine();

  await engine.reload("Qwen2-0.5B-Instruct-q4f16_1-MLC");

  ready = true;

  document.getElementById("output").innerText = "Model ready";
}

window.run = async function () {

  if (!ready) {
    document.getElementById("output").innerText = "Model still loading...";
    return;
  }

  const prompt = document.getElementById("text").value;
  console.log("Prompt:", prompt);
  const reply = await engine.chat.completions.create({
    messages: [{ role: "user", content: prompt }],
    temperature: 0.7
  });

  document.getElementById("output").innerText =
    reply.choices[0].message.content;
};

init();

</script>
